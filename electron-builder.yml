appId: com.codingplan.usagetracker
productName: Coding Plan Usage Tracker
directories:
  output: dist
files:
  - '**/*'
  - '!src{,/**/*}'
  - '!docs{,/**/*}'
  - '!output{,/**/*}'
  - '!scripts{,/**/*}'
  - '!.worktrees{,/**/*}'
  - '!.codex{,/**/*}'
  - '!.vscode{,/**/*}'
  - '!dev-server.log'
  - '!asar-list.txt'
  - '!out/**/*.png'
  - '!out/**/*.log'
  - '!out/stage4-acceptance{,/**/*}'
  - '!out/stage4-test-userdata{,/**/*}'
  - '!out/*.png'
  - '!out/*.log'
  - '!out/*.json'
  - '!out/*.txt'
  - '!out/*.html'
win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/app-icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
