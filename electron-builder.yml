appId: com.codingplan.usagetracker
productName: Coding Plan Usage Tracker
directories:
  output: dist
files:
  - '**/*'
  - '!.env'
  - '!.env.*'
  - '!.npmrc'
  - '!README*.md'
  - '!AGENTS.md'
  - '!build{,/**/*}'
  - '!src{,/**/*}'
  - '!docs{,/**/*}'
  - '!output{,/**/*}'
  - '!scripts{,/**/*}'
  - '!.worktrees{,/**/*}'
  - '!.codex{,/**/*}'
  - '!.vscode{,/**/*}'
  - '!.editorconfig'
  - '!.gitignore'
  - '!.prettierignore'
  - '!.prettierrc.yaml'
  - '!eslint.config.mjs'
  - '!electron.vite.config.ts'
  - '!tsconfig*.json'
  - '!vitest.config.ts'
  - '!package-lock.json'
  - '!dev-server.log'
  - '!asar-list.txt'
  - '!out/**/*.png'
  - '!out/**/*.log'
  - '!out/stage4-acceptance{,/**/*}'
  - '!out/stage4-test-userdata{,/**/*}'
  - '!out/*.png'
  - '!out/*.log'
  - '!out/*.json'
  - '!out/*.txt'
  - '!out/*.html'
win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/app-icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
